name: ci
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [created]  # Only publish on tagged releases
jobs:
  codespell_and_ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v4.0.0
        with:
          version: latest
      - run: pipx run 'codespell[toml]' **/*.py **/*.txt --skip="venv/lib/python3*"
  
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: 
          python-version: 3.x
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install pydoctor
      - name: Run pydoctor
        run: |
          # Do not consider exit code 2 as a real error
          trap 'if [[ "$?" == "2" ]]; then exit 0; fi' EXIT
          # Run pydoctor
          pydoctor \
            --project-url=https://github.com/$GITHUB_REPOSITORY \
            --html-viewsource-base=https://github.com/$GITHUB_REPOSITORY/tree/$GITHUB_SHA \
            --html-base-url=https://$GITHUB_REPOSITORY_OWNER.github.io/${GITHUB_REPOSITORY#*/} \
            --html-output=./www \
            fluidsynth.py
      - if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          commit_message: "Generate API documentation"
          
  ci:
    needs: [codespell_and_ruff]
    strategy:
      fail-fast: false
      matrix:  # macos-26-intel runs on Intel, macos-latest runs on Apple Silicon ARM
        os: [macos-26-intel, macos-latest, ubuntu-latest, ubuntu-24.04-arm, windows-latest]
        # `windows-11-arm` should be added.
        python-version: ['3.14', '3.14t', '3.15t']
        include:
          - os: ubuntu-latest
            python-version: '3.12'
          - os: ubuntu-latest
            python-version: '3.10'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          activate-environment: true
          version: latest
      # OS-specific dependencies
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install fluidsynth libasound-dev portaudio19-dev python3-pyaudio
      - if: runner.os == 'macOS'
        run: |
          brew install fluid-synth
          echo "DYLD_LIBRARY_PATH=$(brew --prefix fluid-synth)/lib/" >> $GITHUB_ENV
      - if: runner.os == 'Windows'
        run: choco install fluidsynth
      # Run pytests
      - run: uv pip install pytest
      - run: uv pip install --editable .
      - run: pytest
      - run: uv pip install pytest-run-parallel
      - run: pytest --iterations=8 --parallel-threads=auto
        if: runner.os != 'macOS'  # Segmentation faults only on macOS
        env:
          PYTEST_RUN_PARALLEL_VERBOSE: 1
      # Import fluidsynth and document OS-specific values
      - shell: python
        name: "import fluidsynth on ${{ matrix.os }} on ${{ runner.arch }}"
        run: |
          import os
          print(f"import fluidsynth on {os.getenv('ImageOS')} on {os.getenv('RUNNER_ARCH')}")
          import fluidsynth
          print(fluidsynth)
          print(dir(fluidsynth))
      # Run OS-specific examples in the test directory
      # NOTE: The files in test/ are NOT unit tests or pytests.
      # On macOS ARM64 the following tests will pass but each takes 8 minutes to run.
      # On macOS X64 all tests will pass quickly.
      - if: runner.os == 'macOS' && runner.arch == 'X64'
        run: |
          test/test1.py
          test/test2.py
          test/test3.py
          test/test8.py
          test/sequencerTest.py
      - if: runner.os == 'Linux'
        run: |
          test/test1.py
          test/test3.py
          test/test8.py
          test/sequencerTest.py
      # On Windows all tests will pass quickly.
      - if: runner.os == 'Windows'
        run: |
          test/test1.py
          test/test2.py
          test/test3.py
          test/test8.py
          test/sequencerTest.py

  build:
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      id-token: write 

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest

      - name: Clean previous builds
        run: rm -rf dist

      - name: Build package
        run: |
          uv build
          uvx twine check --strict dist/*
          ls -la dist

      - name: Upload dist directory as artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  pypi-publish:
    needs: [build]
    name: upload release to PyPI
    if: github.event_name == 'release' && github.event.action == 'created'  # Only on release creation
    runs-on: ubuntu-latest
    # Specifying a GitHub environment is optional, but strongly encouraged
    environment: release
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - run: ls -la
      - run: ls -la dist || true
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest
      - run: uv publish
